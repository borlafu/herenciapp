name: Bug
description: Comportamiento incorrecto o inesperado
title: "[bug] "
labels: ["bug"]
body:
  - type: textarea
    id: steps
    attributes:
      label: Pasos de reproducción
      placeholder: |
        1. Ir a la página principal
        2. Introducir 3 descendientes sin cónyuge
        3. Hacer clic en "Calcular"
        4. Observar el resultado
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Comportamiento esperado
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Comportamiento observado
    validations:
      required: true
  - type: dropdown
    id: severity
    attributes:
      label: Severidad
      options:
        - crítica
        - alta
        - media
        - baja
    validations:
      required: true
  - type: input
    id: environment
    attributes:
      label: Entorno
      placeholder: "Navegador, SO, versión de Node..."
